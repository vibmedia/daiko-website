<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard | Daiko Industrial Solutions</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: #f4f6f8; font-family: 'Inter', sans-serif; display: flex; }
    .sidebar { width: 250px; background: #0F2B46; color: white; min-height: 100vh; padding: 24px; position: fixed;}
    .sidebar h2 { font-family: 'Plus Jakarta Sans'; font-size: 1.5rem; margin-bottom: 32px; color: white;}
    .sidebar ul { list-style: none; padding: 0; margin: 0; }
    .sidebar li { margin-bottom: 16px; }
    .sidebar a { color: rgba(255,255,255,0.7); text-decoration: none; font-weight: 500; font-size: 1.1rem; display: block; padding: 8px; border-radius: 4px; transition: all 0.3s ease;}
    .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.1); color: white; }
    .main-content { margin-left: 250px; flex: 1; padding: 48px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 48px; }
    .header h1 { font-family: 'Plus Jakarta Sans'; }
    .btn-sm { padding: 8px 16px; font-size: 0.9rem; }
    .table-container { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 16px 24px; border-bottom: 1px solid #E2E8F0; }
    th { background: #F8FAFC; color: #4A4A68; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;}
    .actions button { background: none; border: none; cursor: pointer; color: #1B5E8A; margin-right: 8px; font-weight: 600;}
    .actions button.delete { color: #E53E3E; }
    
    /* Modal Styles */
    .modal-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: white; padding: 32px; border-radius: 8px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;}
    .modal h2 { margin-bottom: 24px; font-family: 'Plus Jakarta Sans'; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9rem; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #CBD5E1; border-radius: 4px; font-family: 'Inter'; font-size: 1rem;}
    .form-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Daiko Admin</h2>
    <ul>
      <li><a href="#" class="active" onclick="showTab('projects', event)">Projects</a></li>
      <li><a href="#" onclick="showTab('testimonials', event)">Testimonials</a></li>
      <li><a href="/">Back to Site</a></li>
    </ul>
  </div>
  <div class="main-content">
    
    <!-- Projects Tab -->
    <div id="projects-tab">
      <div class="header">
        <h1>Manage Projects</h1>
        <button class="btn btn-primary btn-sm" onclick="openProjectModal()">+ Add Project</button>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Category</th>
              <th>Location</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="projects-tbody">
            <!-- Rendered via JS -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Testimonials Tab -->
    <div id="testimonials-tab" style="display: none;">
      <div class="header">
        <h1>Manage Testimonials</h1>
        <button class="btn btn-primary btn-sm" onclick="openTestimonialModal()">+ Add Testimonial</button>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Company</th>
              <th>Testimonial Preview</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="testimonials-tbody">
            <!-- Rendered via JS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Project Modal -->
  <div class="modal-backdrop" id="project-modal">
    <div class="modal">
      <h2 id="project-modal-title">Add Project</h2>
      <form id="project-form">
        <input type="hidden" id="project-id">
        <div class="form-group">
          <label>Project Title</label>
          <input type="text" id="project-title" required>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="project-category" required>
            <option value="Monitoring">Monitoring</option>
            <option value="Management">Management</option>
            <option value="Consulting">Consulting</option>
          </select>
        </div>
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="project-location" required>
        </div>
        <div class="form-group">
          <label>Image URL (Optional)</label>
          <input type="url" id="project-image">
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-outline-dark btn-sm" onclick="closeModal('project-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary btn-sm">Save Project</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Testimonial Modal -->
  <div class="modal-backdrop" id="testimonial-modal">
    <div class="modal">
      <h2 id="testimonial-modal-title">Add Testimonial</h2>
      <form id="testimonial-form">
        <input type="hidden" id="testimonial-id">
        <div class="form-group">
          <label>Client Name</label>
          <input type="text" id="testimonial-name" required>
        </div>
        <div class="form-group">
          <label>Company/Role</label>
          <input type="text" id="testimonial-company" required>
        </div>
        <div class="form-group">
          <label>Testimonial Content</label>
          <textarea id="testimonial-content" rows="4" required></textarea>
        </div>
        <div class="form-group">
          <label>Client Image URL (Optional)</label>
          <input type="url" id="testimonial-image">
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-outline-dark btn-sm" onclick="closeModal('testimonial-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary btn-sm">Save Testimonial</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Initial Data Setup (fallback if localStorage is empty)
    const initialProjects = [
      { id: 1, title: 'Ghaziabad Metro Extension', category: 'Monitoring', location: 'Ghaziabad, UP', img: '' },
      { id: 2, title: 'Noida IT Park Complex', category: 'Management', location: 'Noida, UP', img: '' }
    ];
    const initialTestimonials = [
      { id: 1, name: 'Rajesh Mehta', company: 'Apex Constructions', content: 'Daiko\'s approach to integrating our site workflows saved us countless hours.', img: '' }
    ];

    let projects = JSON.parse(localStorage.getItem('daiko_projects')) || initialProjects;
    let testimonials = JSON.parse(localStorage.getItem('daiko_testimonials')) || initialTestimonials;

    function saveData() {
      localStorage.setItem('daiko_projects', JSON.stringify(projects));
      localStorage.setItem('daiko_testimonials', JSON.stringify(testimonials));
      renderTables();
    }

    function showTab(tabName, event) {
      if(event) event.preventDefault();
      document.getElementById('projects-tab').style.display = tabName === 'projects' ? 'block' : 'none';
      document.getElementById('testimonials-tab').style.display = tabName === 'testimonials' ? 'block' : 'none';
      document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
      if(event) event.target.classList.add('active');
    }

    function closeModal(modalId) {
      document.getElementById(modalId).style.display = 'none';
    }

    // --- Projects Logic ---
    function renderProjects() {
      const tbody = document.getElementById('projects-tbody');
      tbody.innerHTML = '';
      projects.forEach(p => {
        const tr = document.createElement('tr');
        tr.innerHTML = \`
          <td>\${p.title}</td>
          <td>\${p.category}</td>
          <td>\${p.location}</td>
          <td class="actions">
            <button onclick="editProject(\${p.id})">Edit</button>
            <button class="delete" onclick="deleteProject(\${p.id})">Delete</button>
          </td>
        \`;
        tbody.appendChild(tr);
      });
    }

    function openProjectModal(id = null) {
      const modal = document.getElementById('project-modal');
      const form = document.getElementById('project-form');
      form.reset();
      document.getElementById('project-id').value = '';
      document.getElementById('project-modal-title').textContent = id ? 'Edit Project' : 'Add Project';
      
      if (id) {
        const p = projects.find(x => x.id === id);
        if (p) {
          document.getElementById('project-id').value = p.id;
          document.getElementById('project-title').value = p.title;
          document.getElementById('project-category').value = p.category;
          document.getElementById('project-location').value = p.location;
          document.getElementById('project-image').value = p.img || '';
        }
      }
      modal.style.display = 'flex';
    }

    function editProject(id) { openProjectModal(id); }
    function deleteProject(id) {
      if(confirm('Are you sure you want to delete this project?')) {
        projects = projects.filter(p => p.id !== id);
        saveData();
      }
    }

    document.getElementById('project-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const id = document.getElementById('project-id').value;
      const data = {
        title: document.getElementById('project-title').value,
        category: document.getElementById('project-category').value,
        location: document.getElementById('project-location').value,
        img: document.getElementById('project-image').value
      };
      
      if (id) {
        // Edit
        const index = projects.findIndex(p => p.id == id);
        projects[index] = { ...projects[index], ...data };
      } else {
        // Add
        data.id = Date.now();
        projects.push(data);
      }
      closeModal('project-modal');
      saveData();
    });

    // --- Testimonials Logic ---
    function renderTestimonials() {
      const tbody = document.getElementById('testimonials-tbody');
      tbody.innerHTML = '';
      testimonials.forEach(t => {
        const preview = t.content.length > 40 ? t.content.substring(0, 40) + '...' : t.content;
        const tr = document.createElement('tr');
        tr.innerHTML = \`
          <td>\${t.name}</td>
          <td>\${t.company}</td>
          <td>\${preview}</td>
          <td class="actions">
            <button onclick="editTestimonial(\${t.id})">Edit</button>
            <button class="delete" onclick="deleteTestimonial(\${t.id})">Delete</button>
          </td>
        \`;
        tbody.appendChild(tr);
      });
    }

    function openTestimonialModal(id = null) {
      const modal = document.getElementById('testimonial-modal');
      const form = document.getElementById('testimonial-form');
      form.reset();
      document.getElementById('testimonial-id').value = '';
      document.getElementById('testimonial-modal-title').textContent = id ? 'Edit Testimonial' : 'Add Testimonial';
      
      if (id) {
        const t = testimonials.find(x => x.id === id);
        if (t) {
          document.getElementById('testimonial-id').value = t.id;
          document.getElementById('testimonial-name').value = t.name;
          document.getElementById('testimonial-company').value = t.company;
          document.getElementById('testimonial-content').value = t.content;
          document.getElementById('testimonial-image').value = t.img || '';
        }
      }
      modal.style.display = 'flex';
    }

    function editTestimonial(id) { openTestimonialModal(id); }
    function deleteTestimonial(id) {
      if(confirm('Are you sure you want to delete this testimonial?')) {
        testimonials = testimonials.filter(t => t.id !== id);
        saveData();
      }
    }

    document.getElementById('testimonial-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const id = document.getElementById('testimonial-id').value;
      const data = {
        name: document.getElementById('testimonial-name').value,
        company: document.getElementById('testimonial-company').value,
        content: document.getElementById('testimonial-content').value,
        img: document.getElementById('testimonial-image').value
      };
      
      if (id) {
        // Edit
        const index = testimonials.findIndex(t => t.id == id);
        testimonials[index] = { ...testimonials[index], ...data };
      } else {
        // Add
        data.id = Date.now();
        testimonials.push(data);
      }
      closeModal('testimonial-modal');
      saveData();
    });

    function renderTables() {
      renderProjects();
      renderTestimonials();
    }

    // Initialize
    renderTables();
  </script>
</body>
</html>
